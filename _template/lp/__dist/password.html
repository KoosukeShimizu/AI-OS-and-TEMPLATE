<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="robots" content="noindex,nofollow,noarchive">
    <title>パスワード再設定｜N2 CLINIC 銀座本院</title>
    <meta name="description" content="パスワード再設定ページです。登録済みのメールアドレスに届いたリンクから新しいパスワードを設定できます。">
    <meta name="keywords" content="N2クリニック, マイページ, パスワード再設定">
    <meta name="format-detection" content="telephone=no">
    <link rel="shortcut icon" href="./assets/img/common/favicon.ico" type="image/x-icon">
    <meta name="robots" content="max-image-preview:large">
    <!-- CSS-->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/main.css?ver=1.0.0" type="text/css" media="all">
    <!-- STRUCTURED DATA (SCHEMA)-->
  </head>
  <body class="p-reserve">
    <div class="l-wrapper">
      <header class="l-header p-reserve-header">
        <div class="p-reserve-header__logo"><a href="./"><img src="./assets/img/common/logo-ginza.png" alt="N2 CLINIC 銀座本院"></a></div>
      </header>
      <main class="l-main u-anim-fadeIn">
        <!-- Article START-->
        <article class="l-page">
          <!-- Heroセクション-->
          <div class="l-page__head">
            <h1 class="l-page__title">パスワード再設定</h1>
            <div class="l-page__sub">WELCOME TO N2 ClINIC GINZA</div>
          </div>
          <div class="l-page__body">
            <section class="l-section -xxs">
              <div class="l-inner -xxs">
                <div class="c-text u-mb-l">新しく設定するパスワードを入力してください。</div>
                <form method="post" action="./password-thanks.html" enctype="multipart/form-data"></form>
                <div class="c-form">
                  <div class="c-form__item">
                    <div class="c-form__label">新しいパスワード</div>
                    <div class="c-form__body">
                      <input class="c-form__password u-fz-l" type="password" id="new-password" name="new-password" placeholder="新しいパスワードを入力" autocomplete="new-password" required data-password-input>
                      <button class="c-form__pwToggle" type="button" aria-label="パスワード表示切替" data-password-toggle></button>
                    </div>
                  </div>
                  <div class="c-form__item">
                    <div class="c-form__label">新しいパスワード（確認）</div>
                    <div class="c-form__body">
                      <input class="c-form__password u-fz-l" type="password" id="confirm-password" name="confirm-password" placeholder="確認のため再入力" autocomplete="new-password" required data-password-input>
                      <button class="c-form__pwToggle" type="button" aria-label="パスワード表示切替" data-password-toggle></button>
                    </div>
                  </div>
                </div>
                <!-- 送信ボタン-->
                <div class="c-btnBox u-my-l">
                  <button class="c-btn -underline" type="submit" data-submit-button>送信する</button>
                </div>
              </div>
            </section>
          </div>
        </article>
        <!-- Article END-->
      </main>
    </div>
    <script src="./assets/js/main.js?ver=1.0.0"></script>
    <script src="./assets/js/form.js?ver=1.0.0"></script>
  </body>
</html>
